name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'LICENSE'
      - '**/*.drawio'
      - '**/*.jpg'
      - '**/*.png'
      - '**/README.md'
  pull_request:
    paths-ignore:
      - 'CHANGELOG.md'
      - 'LICENSE'
      - '**/*.drawio'
      - '**/*.jpg'
      - '**/*.png'
      - '**/README.md'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    needs: clippy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bin:
          - description: "QuinLED Dig Quad"
            target: "xtensa-esp32-none-elf"
            working-directory: "./quinled_dig_quad"
          - description: "Micro:bit V2"
            target: "thumbv7em-none-eabihf"
            working-directory: "./microbit_v2"

    steps:
    - uses: actions/checkout@v7
    - uses: actions/cache@v6
      with:
        key: ${{ runner.os }}-${{ matrix.bin.target }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/

    - if: matrix.bin.target == 'thumbv7em-none-eabihf'
      name: Install ${{ matrix.bin.target }} target
      run: rustup target add ${{ matrix.bin.target }}

    - if: matrix.bin.target == 'xtensa-esp32-none-elf'
      name: Install ${{ matrix.bin.target }} toolchain and target
      uses: esp-rs/xtensa-toolchain@v1.7
      with:
        default: true
        buildtargets: esp32
        ldproxy: false

    - name: Build for ${{ matrix.bin.description }}
      working-directory: ${{ matrix.bin.working-directory }}
      run: cargo build

  clippy:
    needs: fmt
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bin:
          - description: "QuinLED Dig Quad"
            target: "xtensa-esp32-none-elf"
            working-directory: "./quinled_dig_quad"
          - description: "Micro:bit V2"
            target: "thumbv7em-none-eabihf"
            working-directory: "./microbit_v2"

    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache@v6
        with:
          key: ${{ runner.os }}-${{ matrix.bin.target }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/

      - if: matrix.bin.target == 'thumbv7em-none-eabihf'
        name: Install ${{ matrix.bin.target }} target
        run: rustup target add ${{ matrix.bin.target }}

      - if: matrix.bin.target == 'xtensa-esp32-none-elf'
        name: Install ${{ matrix.bin.target }} toolchain and target
        uses: esp-rs/xtensa-toolchain@v1.7
        with:
          default: true
          buildtargets: esp32
          ldproxy: false

      - name: Run cargo clippy for ${{ matrix.bin.description }}
        working-directory: ${{ matrix.bin.working-directory }}
        run: cargo clippy --all-features -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run cargo fmt
        run: cargo fmt --all -- --check
